<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Application Form - Hostel Leave Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px 0;
        }
        .form-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .error-message {
            color: red;
            display: none;
            margin-top: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-4">Hostel Leave Application Form</h2>
            <form id="leaveForm" onsubmit="return submitForm()">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="studentName" class="form-label">Student Name</label>
                        <input type="text" class="form-control" id="studentName" required>
                    </div>
                    <div class="col-md-6">
                        <label for="department" class="form-label">Department</label>
                        <input type="text" class="form-control" id="department" required>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="rollNumber" class="form-label">Roll Number</label>
                        <input type="text" class="form-control" id="rollNumber" required>
                    </div>
                    <div class="col-md-6">
                        <label for="registerNumber" class="form-label">Register Number</label>
                        <input type="text" class="form-control" id="registerNumber" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="reason" class="form-label">Reason to Leave Hostel</label>
                    <textarea class="form-control" id="reason" rows="3" required></textarea>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="leaveDate" class="form-label">Date of Leaving</label>
                        <input type="date" class="form-control" id="leaveDate" required>
                    </div>
                    <div class="col-md-6">
                        <label for="returnDate" class="form-label">Date of Returning</label>
                        <input type="date" class="form-control" id="returnDate" required>
                    </div>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Submit Application</button>
                    <a href="student_dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function submitForm() {
            const leaveDate = new Date(document.getElementById('leaveDate').value);
            const returnDate = new Date(document.getElementById('returnDate').value);
            
            if (returnDate <= leaveDate) {
                alert('Return date must be after leave date');
                return false;
            }

            // Store the form data (in a real application, this would be sent to a server)
            const formData = {
                studentName: document.getElementById('studentName').value,
                department: document.getElementById('department').value,
                rollNumber: document.getElementById('rollNumber').value,
                registerNumber: document.getElementById('registerNumber').value,
                reason: document.getElementById('reason').value,
                leaveDate: document.getElementById('leaveDate').value,
                returnDate: document.getElementById('returnDate').value,
                status: 'pending'
            };

            // Store the application in localStorage for demo purposes
            let applications = JSON.parse(localStorage.getItem('leaveApplications') || '[]');
            applications.push(formData);
            localStorage.setItem('leaveApplications', JSON.stringify(applications));

            alert('Leave application submitted successfully!');
            window.location.href = 'student_dashboard.html';
            return false;
        }
    </script>
</body>
</html>
