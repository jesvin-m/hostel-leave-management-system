<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Pass - Hostel Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .leave-pass-card {
            max-width: 500px;
            width: 90%;
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        
        .card-header {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 20px 20px 0 0;
            padding: 30px 24px;
        }
        
        .detail-card {
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .detail-label {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .detail-value {
            font-size: 1rem;
            font-weight: 600;
            color: #0f172a;
        }
        
        .status-card {
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 12px;
            color: white;
            text-align: center;
            padding: 16px;
        }
        
        .status-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fbbf24;
        }
        
        .error-card {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            text-align: center;
            padding: 40px 24px;
        }
        
        .loading-spinner {
            width: 3rem;
            height: 3rem;
        }
    </style>
</head>
<body>
    <div class="container-fluid vh-100 d-flex align-items-center justify-content-center">
        <div class="card leave-pass-card" id="leavePassCard">
            <!-- Loading State -->
            <div id="loadingState" class="text-center p-5">
                <div class="spinner-border text-primary loading-spinner mb-3" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <h4 class="text-white">Loading Leave Pass...</h4>
            </div>
            
            <!-- Error State -->
            <div id="errorState" class="error-card" style="display: none;">
                <div class="mb-4">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" class="text-warning">
                        <path d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h3 class="mb-3">Invalid QR Code</h3>
                <p class="mb-4">The QR code you scanned is not valid or has expired.</p>
                <button class="btn btn-light" onclick="window.close()">Close Window</button>
            </div>
            
            <!-- Success State -->
            <div id="successState" style="display: none;">
                <!-- Header -->
                <div class="card-header text-center">
                    <div class="mb-3">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" class="text-white">
                            <path d="M9 12l2 2 4-4M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9 9 4.03 9 9z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h3 class="mb-2" style="font-weight: 700;">Valid Leave Pass</h3>
                    <p class="mb-0" style="opacity: 0.9;">Hostel Leave Management System</p>
                </div>

                <!-- Body -->
                <div class="card-body p-4">
                    <div class="detail-card">
                        <div class="detail-label">Student Name</div>
                        <div class="detail-value" id="studentName">-</div>
                    </div>
                    
                    <div class="detail-card">
                        <div class="detail-label">Roll Number</div>
                        <div class="detail-value" id="rollNumber">-</div>
                    </div>

                    <div class="row">
                        <div class="col-6">
                            <div class="detail-card">
                                <div class="detail-label">From Date</div>
                                <div class="detail-value" id="fromDate">-</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="detail-card">
                                <div class="detail-label">To Date</div>
                                <div class="detail-value" id="toDate">-</div>
                            </div>
                        </div>
                    </div>

                    <div class="status-card">
                        <div class="detail-label" style="opacity: 0.9;">Status</div>
                        <div class="status-value" id="status">-</div>
                    </div>

                    <!-- Footer -->
                    <div class="text-center mt-4">
                        <div class="mb-3">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" style="color: #10b981;">
                                <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M9 9h6v6H9z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <p class="text-muted mb-3" style="font-size: 0.9rem;">
                            This leave pass is valid and authorized by the hostel management.
                        </p>
                        <button class="btn btn-outline-secondary btn-sm" onclick="window.close()">
                            Close Window
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get URL parameters
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        // Parse QR code data
        function parseQRData() {
            const urlParams = new URLSearchParams(window.location.search);
            const data = urlParams.get('data');
            
            if (data) {
                try {
                    return JSON.parse(decodeURIComponent(data));
                } catch (e) {
                    return null;
                }
            }
            return null;
        }

        // Display student data
        function displayStudentData(studentData) {
            document.getElementById('studentName').textContent = studentData.name || '-';
            document.getElementById('rollNumber').textContent = studentData.rollNumber || '-';
            document.getElementById('fromDate').textContent = studentData.fromDate || '-';
            document.getElementById('toDate').textContent = studentData.toDate || '-';
            document.getElementById('status').textContent = (studentData.status || 'unknown').toUpperCase();
            
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('successState').style.display = 'block';
        }

        // Show error
        function showError() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                const studentData = parseQRData();
                
                if (studentData && studentData.name && studentData.rollNumber) {
                    displayStudentData(studentData);
                } else {
                    showError();
                }
            }, 1000); // Show loading for 1 second
        });
    </script>
</body>
</html>
